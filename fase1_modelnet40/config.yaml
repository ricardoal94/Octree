project:
  name: "ModelNet40 - Clasificacion 3D con PointNet"
  fase: 1
  descripcion: "Definicion del caso de estudio y control de estocasticidad"

reproducibilidad:
  seed: 42
  deterministic: true
  benchmark: false  # cudnn.benchmark=False para reproducibilidad

dataset:
  nombre: "ModelNet40"
  clases: 40
  train_total: 9843
  test_total: 2468
  val_split: 0.10        # 10% del train para validacion interna
  num_points: 1024       # puntos por nube de puntos
  data_augmentation: true

modelo:
  nombre: "Net5_PointNet"
  input_channels: 3      # x, y, z
  feature_dim: 1024
  num_clases: 40
  dropout: 0.3

entrenamiento:
  batch_size: 32
  epochs: 200
  learning_rate: 0.001
  optimizer: "Adam"
  scheduler: "StepLR"
  step_size: 20
  gamma: 0.7
  weight_decay: 0.0001

bosque_aleatorio:
  n_estimators: 100
  max_depth: null
  min_samples_split: 2
  random_state: 42       # misma seed global

hardware:
  dispositivo: "auto"    # "cuda" si disponible, sino "cpu"
  num_workers: 4
  pin_memory: true

librerias:
  python: "3.10+"
  torch: ">=2.0.0"
  torchvision: ">=0.15.0"
  numpy: ">=1.24.0"
  scikit-learn: ">=1.3.0"
  pyyaml: ">=6.0"
  tqdm: ">=4.65.0"
  open3d: ">=0.17.0"

rutas:
  dataset_root: "./data/modelnet40"
  checkpoints: "./checkpoints"
  logs: "./logs"
  resultados: "./resultados"
